server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. index.html: NIE cachen
    # Diese Datei verweist auf die aktuellen Bundle-Files mit Hashes.
    # Wenn der Browser eine alte index.html cached, sieht der User
    # nach einem Deployment immer noch die alte Version der App.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # 2. Hashed Files (JS, CSS): LANGE cachen (1 Jahr)
    # Diese Dateien haben einen Hash im Namen (z.B. main-A7F3B2C1.js).
    # Wenn sich der Inhalt ändert, ändert sich der Hash → neuer Dateiname.
    # Daher kann der Browser sie bedenkenlos lange speichern.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 3. Frontend: Angular App ausliefern (wie bisher)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 4. Backend: API Anfragen weiterleiten (wie bisher)
    location /api/ {
        proxy_pass http://srs-backend-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
